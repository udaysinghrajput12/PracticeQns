<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Table</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Spring Flowers School</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Student Time Table</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Day</th>
                    <th>1st Period</th>
                    <th>2nd Period</th>
                    <th>3rd Period</th>
                    <th>4th Period</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Monday</td>
                    <td>Math</td>
                    <td>English</td>
                    <td>Science</td>
                    <td>Computer</td>
                </tr>
                <tr>
                    <td>Tuesday</td>
                    <td>Science</td>
                    <td>Math</td>
                    <td>English</td>
                    <td>Sports</td>
                </tr>
                <tr>
                    <td>Wednesday</td>
                    <td>Computer</td>
                    <td>Science</td>
                    <td>Math</td>
                    <td>English</td>
                </tr>
                <tr>
                    <td>Thursday</td>
                    <td>English</td>
                    <td>Computer</td>
                    <td>Math</td>
                    <td>Science</td>
                </tr>
                <tr>
                    <td>Friday</td>
                    <td>Sports</td>
                    <td>Math</td>
                    <td>English</td>
                    <td>Science</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="text-center mt-3">
        <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>
</div>

</body>
</html>
